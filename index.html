<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeRace – Start</title>
    <link rel="icon" href="assets/weraceLogo.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
        }

        img.logo {
            height: 36px;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            overflow: hidden;
        }

        .card-header {
            padding: 0.6rem 1rem;
            font-size: 0.65rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .event-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-item:active {
            background: #30363d;
        }

        .event-item.selected {
            border-left: 3px solid #f78166;
            padding-left: calc(1rem - 3px);
        }

        .event-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .event-meta {
            font-size: 0.7rem;
            color: #8b949e;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .quali-badge {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 0.1rem 0.4rem;
            font-size: 0.65rem;
            color: #8b949e;
        }

        .section {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-label {
            font-size: 0.65rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        a.tile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
        }

        a.tile:active {
            background: #30363d;
        }

        a.tile .badge {
            font-size: 0.75rem;
            font-weight: 600;
            color: #8b949e;
        }

        a.tile .tile-sub {
            font-size: 0.7rem;
            font-weight: 400;
            color: #8b949e;
            margin-top: 0.1rem;
        }

        a.tile.accent .tile-sub {
            color: color-mix(in srgb, #f78166 60%, #8b949e);
        }

        .tile-label {
            display: flex;
            flex-direction: column;
        }

        a.tile.accent {
            border-color: #f78166;
            color: #f78166;
        }

        .change-btn {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        .spinner {
            width: 1rem;
            height: 1rem;
            border: 2px solid #30363d;
            border-top-color: #8b949e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <script src="config.js"></script>
    <script>
        const _seedOverride = localStorage.getItem('seedEventOverride');
        if (_seedOverride) CONFIG.eventObjectId = _seedOverride;
    </script>
    <script src="parse-api.js"></script>
</head>

<body>
    <img class="logo" src="assets/weraceLogo.png" alt="WeRace">

    <!-- Event picker -->
    <div class="card" id="picker-card">
        <div class="card-header">Event auswählen</div>
        <div id="event-list">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- App links — shown after event is selected -->
    <div class="section" id="app-section" style="display:none">
        <div class="card">
            <div class="card-header">
                <span id="selected-event-name">—</span>
                <button class="change-btn" id="change-btn">ändern</button>
            </div>
        </div>

        <div class="link-label">Organisation</div>
        <a class="tile accent" href="htmlPages/starter.html" target="werace-starter" rel="noopener">
            <div class="tile-label">Rennleitung<div class="tile-sub">Zentrales Gerät am Startbereich</div></div>
            <span class="badge">↗</span></a>
        <a class="tile accent" id="referee-link" href="htmlPages/referee.html" target="werace-referee" rel="noopener" style="display:none">
            <div class="tile-label">Obmann<div class="tile-sub">Tablet Obmann</div></div>
            <span class="badge">↗</span></a>

        <div class="link-label" style="margin-top:0.25rem">Public</div>
        <a class="tile" href="htmlPages/results.html" target="werace-results" rel="noopener">
            <div class="tile-label">Ergebnisse<div class="tile-sub">Großbildschirm / Zuschauer</div></div>
            <span class="badge">↗</span></a>

        <div class="link-label" style="margin-top:0.25rem">Kampfrichter</div>
        <div id="jury-links" style="display:flex;flex-direction:column;gap:0.75rem"></div>
    </div>

    <script>
        async function loadEvents() {
            const list = document.getElementById('event-list');
            try {
                const events = await ParseAPI.fetchAllEvents();
                list.innerHTML = '';
                if (!events.length) {
                    list.innerHTML = '<div style="padding:1rem;color:#8b949e;font-size:0.9rem;text-align:center">Keine Events gefunden</div>';
                    return;
                }
                for (const ev of events) {
                    const item = document.createElement('div');
                    item.className = 'event-item' + (CONFIG.eventObjectId === ev.objectId ? ' selected' : '');
                    item.innerHTML =
                        `<span class="event-name">${ev.name}</span>` +
                        `<span class="event-meta">` +
                        (ev.qualiRuns != null ? `<span class="quali-badge">${ev.qualiRuns}× Quali</span>` : '') +
                        `</span>`;
                    item.addEventListener('click', () => selectEvent(ev));
                    list.appendChild(item);
                }
            } catch (e) {
                list.innerHTML = '<div style="padding:1rem;color:#f78166;font-size:0.9rem;text-align:center">Fehler beim Laden</div>';
            }
        }

        async function selectEvent(ev) {
            localStorage.setItem('werace-event', JSON.stringify({ objectId: ev.objectId, name: ev.name }));
            CONFIG.eventObjectId = ev.objectId;
            CONFIG.eventName = ev.name;

            document.getElementById('picker-card').style.display = 'none';
            document.getElementById('app-section').style.display = '';
            document.getElementById('selected-event-name').textContent = ev.name;
            document.title = `${ev.name} – Start`;

            // Load judges for this event
            const juryLinks = document.getElementById('jury-links');
            juryLinks.innerHTML = '<div class="spinner"></div>';
            try {
                await Promise.all([ParseAPI.fetchEvent(), ParseAPI.fetchJudges()]);
                juryLinks.innerHTML = '';

                // Referee link — token is only known after fetchEvent
                const refLink = document.getElementById('referee-link');
                const refHref = CONFIG.refereeToken
                    ? `htmlPages/referee.html?token=${encodeURIComponent(CONFIG.refereeToken)}`
                    : 'htmlPages/referee.html';
                refLink.href = refHref;
                refLink.style.display = '';

                for (const [token, name] of Object.entries(CONFIG.judgeTokens)) {
                    const a = document.createElement('a');
                    a.className = 'tile';
                    a.href = `htmlPages/jury.html?token=${encodeURIComponent(token)}`;
                    a.target = `werace-jury-${token}`;
                    a.rel = 'noopener';
                    a.innerHTML = `<div class="tile-label">Wertung – ${name}<div class="tile-sub">Tablet Kampfrichter</div></div> <span class="badge">↗</span>`;
                    juryLinks.appendChild(a);
                }
            } catch {
                juryLinks.innerHTML = '<div style="color:#f78166;font-size:0.9rem">Fehler beim Laden der Kampfrichter</div>';
            }
        }

        document.getElementById('change-btn').addEventListener('click', () => {
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('picker-card').style.display = '';
            loadEvents();
        });

        // On load: if an event is already saved, go straight to app links
        if (CONFIG.eventObjectId) {
            selectEvent({ objectId: CONFIG.eventObjectId, name: CONFIG.eventName });
        }
        loadEvents();
    </script>
</body>

</html>
