<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heldentag</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            max-width: 360px;
        }

        .link-label {
            font-size: 0.65rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        a.tile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            transition: border-color 0.15s;
        }

        a.tile:active { background: #30363d; }

        a.tile .badge {
            font-size: 0.75rem;
            font-weight: 600;
            color: #8b949e;
        }

        a.tile.accent { border-color: #f78166; color: #f78166; }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <h1>Heldentag</h1>

    <div class="links">
        <div class="link-label">Ansage</div>
        <a class="tile accent" href="starter.html">Starter <span class="badge">→</span></a>

        <div class="link-label" style="margin-top:0.5rem">Kampfrichter</div>
        <div id="jury-links"></div>
    </div>

    <script>
        const juryLinks = document.getElementById('jury-links');
        juryLinks.style.display = 'flex';
        juryLinks.style.flexDirection = 'column';
        juryLinks.style.gap = '0.75rem';

        for (const [token, name] of Object.entries(CONFIG.judgeTokens)) {
            const a = document.createElement('a');
            a.className = 'tile';
            a.href = `jury.html?token=${encodeURIComponent(token)}`;
            a.innerHTML = `${name} <span class="badge">→</span>`;
            juryLinks.appendChild(a);
        }
    </script>
</body>
</html>
